# SonarQube Cloud — proyecto Calculator
# ⚠️ Verifica que projectKey/organization coincidan EXACTAMENTE con los de
# sonarcloud.io (Proyecto → Information). Si no coinciden, el análisis falla.
sonar.organization=jrosas47
sonar.projectKey=jrosas47_learn-react-calculator

# El análisis corre con projectBaseDir = "07. Calculator", así que "." = esa carpeta.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.test.jsx
sonar.exclusions=node_modules/**,dist/**,coverage/**

# Cobertura generada por Vitest (relativa a esta carpeta).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
