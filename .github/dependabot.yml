version: 2

updates:
  # Acciones usadas en los workflows de .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Proyecto activo: Calculator
  - package-ecosystem: npm
    directory: "/07. Calculator"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Agrupa minor/patch en un solo PR por proyecto para reducir ruido.
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Proyecto activo: react-welcome-home
  - package-ecosystem: npm
    directory: "/react-welcome-home"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
