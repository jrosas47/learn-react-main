name: Dependabot auto-merge

# Habilita el auto-merge de los PRs de Dependabot que sean de tipo "patch".
# El merge real solo ocurre cuando el CI (checks requeridos) pasa en verde.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Solo PRs creados por Dependabot.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Obtener metadata de Dependabot
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activar auto-merge para actualizaciones patch
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
