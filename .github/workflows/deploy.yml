name: Deploy a GitHub Pages

# Publica los dos proyectos activos como sitio estático en GitHub Pages,
# bajo subrutas: /calculator y /welcome-home (con un index que los enlaza).
# Solo despliega cuando main avanza (o manualmente con "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que exige el despliegue a Pages mediante Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela el que ya esté publicando.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build del sitio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            07. Calculator/package-lock.json
            react-welcome-home/package-lock.json

      # Pages sirve en https://<usuario>.github.io/<repo>/ → el base debe incluir
      # el nombre del repo y la subruta. Se pasa por CLI para NO tocar vite.config.
      - name: Build Calculator
        working-directory: "07. Calculator"
        run: |
          npm ci
          npm run build -- --base=/learn-react-main/calculator/

      - name: Build react-welcome-home
        working-directory: react-welcome-home
        run: |
          npm ci
          npm run build -- --base=/learn-react-main/welcome-home/

      - name: Ensamblar el sitio (_site/)
        shell: bash
        run: |
          mkdir -p _site
          cp -r "07. Calculator/dist" "_site/calculator"
          cp -r "react-welcome-home/dist" "_site/welcome-home"
          cp .github/pages-index.html _site/index.html

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy a Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
