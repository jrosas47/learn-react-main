name: CodeQL

# Análisis estático de seguridad (GitHub CodeQL) para JavaScript/JSX.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Semanal: lunes 04:23 UTC (detecta vulnerabilidades nuevas aunque no haya cambios).
    - cron: "23 4 * * 1"

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # JavaScript no requiere build: CodeQL analiza el código fuente directamente.
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
