name: CI

# Se ejecuta en cada push y en cada pull request (todas las ramas).
on:
  push:
  pull_request:

# Cancela ejecuciones anteriores del mismo ref si llega un nuevo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · ${{ matrix.project }}
    runs-on: ubuntu-latest

    # Este repo no tiene package.json raíz ni tests/linters: cada proyecto es
    # un Vite independiente. El CI verifica que los proyectos ACTIVOS compilen.
    # Para añadir más, agrega su carpeta a esta lista.
    strategy:
      fail-fast: false
      matrix:
        project:
          - "07. Calculator"
          - "react-welcome-home"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "${{ matrix.project }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        # npm ci (con caché) si el lockfile está sincronizado; npm install como respaldo.
        run: npm ci || npm install

      - name: Lint (ESLint)
        working-directory: ${{ matrix.project }}
        run: npm run lint

      - name: Formato (Prettier)
        working-directory: ${{ matrix.project }}
        run: npm run format:check

      - name: Type check (solo si hay TypeScript)
        working-directory: ${{ matrix.project }}
        shell: bash
        # "si usas TypeScript": solo corre tsc --noEmit cuando existe tsconfig.json.
        run: |
          if [ -f tsconfig.json ]; then
            echo "tsconfig.json encontrado → ejecutando tsc --noEmit"
            npx tsc --noEmit
          else
            echo "Sin tsconfig.json: proyecto JS, se omite el type check."
          fi

      - name: Build
        working-directory: ${{ matrix.project }}
        run: npm run build
